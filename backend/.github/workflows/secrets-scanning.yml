name: Secret Scanning Pipeline

on:
  push:
    branches: [ secops ]

jobs:
  secret-detection:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0 
          
      - name: Create results directory
        run: mkdir -p security-results

      - name: Run TruffleHog
        id: trufflehog
        continue-on-error: true
        run: |
          echo " Running TruffleHog secret detection..."
          docker run --rm -v "$PWD:/pwd" \
            -v "$PWD/security-results:/results" \
            trufflesecurity/trufflehog:latest filesystem /pwd \
            --json > security-results/trufflehog-results.json || echo "TruffleHog scan completed"
          
          # Create human-readable report
          docker run --rm -v "$PWD:/pwd" \
            trufflesecurity/trufflehog:latest filesystem /pwd \
            --no-verification > security-results/trufflehog-report.txt || echo "TruffleHog report generated"

      - name: Run GitLeaks
        id: gitleaks
        continue-on-error: true
        run: |
          echo " Running GitLeaks secret detection..."
          docker run --rm -v "$PWD:/repo" \
            -v "$PWD/security-results:/results" \
            zricethezav/gitleaks:latest detect \
            --source="/repo" \
            --report-format=json \
            --report-path="/results/gitleaks-results.json" \
            --verbose || echo "GitLeaks scan completed"
          
          # Generate readable report
          docker run --rm -v "$PWD:/repo" \
            -v "$PWD/security-results:/results" \
            zricethezav/gitleaks:latest detect \
            --source="/repo" \
            --report-format=sarif \
            --report-path="/results/gitleaks-sarif.json" \
            --verbose || echo "GitLeaks SARIF report generated"

      - name: Process Results
        run: |
          echo " Processing scan results..."
          
          # Check if results files exist and have content
          trufflehog_count=0
          gitleaks_count=0
          
          # Count TruffleHog results (handles NDJSON format)
          if [ -f "security-results/trufflehog-results.json" ] && [ -s "security-results/trufflehog-results.json" ]; then
            # Count lines in the JSON file (each line is one finding)
            trufflehog_count=$(wc -l < security-results/trufflehog-results.json 2>/dev/null || echo 0)
            # Remove any whitespace
            trufflehog_count=$(echo "$trufflehog_count" | tr -d ' \t\n\r')
          fi
          
          # Count GitLeaks results
          if [ -f "security-results/gitleaks-results.json" ] && [ -s "security-results/gitleaks-results.json" ]; then
            # GitLeaks typically outputs an array, so we can use jq length
            # But first check if it's valid JSON
            if jq empty security-results/gitleaks-results.json 2>/dev/null; then
              # If it's a JSON array, get length
              if jq -e '. | type == "array"' security-results/gitleaks-results.json >/dev/null 2>&1; then
                gitleaks_count=$(jq '. | length' security-results/gitleaks-results.json 2>/dev/null || echo 0)
              else
                # If it's NDJSON (newline-delimited), count lines
                gitleaks_count=$(wc -l < security-results/gitleaks-results.json 2>/dev/null || echo 0)
              fi
            else
              # If not valid JSON, count non-empty lines
              gitleaks_count=$(grep -c . security-results/gitleaks-results.json 2>/dev/null || echo 0)
            fi
            # Remove any whitespace
            gitleaks_count=$(echo "$gitleaks_count" | tr -d ' \t\n\r')
          fi
          
          # Ensure we have valid integers
          if ! [[ "$trufflehog_count" =~ ^[0-9]+$ ]]; then
            trufflehog_count=0
          fi
          if ! [[ "$gitleaks_count" =~ ^[0-9]+$ ]]; then
            gitleaks_count=0
          fi
          
          echo "TRUFFLEHOG_COUNT=$trufflehog_count" >> $GITHUB_ENV
          echo "GITLEAKS_COUNT=$gitleaks_count" >> $GITHUB_ENV
          
          echo " TruffleHog findings: $trufflehog_count"
          echo " GitLeaks findings: $gitleaks_count"
          
          # Create summary report
          cat > security-results/summary.md << EOF
          # 🔐 Security Scan Results Summary
          
          ## Scan Overview
          - **TruffleHog Findings:** $trufflehog_count potential secrets
          - **GitLeaks Findings:** $gitleaks_count potential secrets
          - **Scan Date:** $(date)
          - **Repository:** ${{ github.repository }}
          - **Branch/PR:** ${{ github.ref_name }}
          
          ## Status
          $(if [ "$trufflehog_count" -eq 0 ] && [ "$gitleaks_count" -eq 0 ]; then
            echo " **No secrets detected!** Your repository appears clean."
          else
            echo " **Potential secrets found!** Please review the detailed reports below."
          fi)
          EOF

      - name: Display Results Summary
        run: |
          echo "# 🔐 Secret Scanning Results" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Tool | Findings | Status |" >> $GITHUB_STEP_SUMMARY
          echo "|------|----------|--------|" >> $GITHUB_STEP_SUMMARY
          echo "| TruffleHog | $TRUFFLEHOG_COUNT | $(if [ "$TRUFFLEHOG_COUNT" -eq 0 ]; then echo '✅ Clean'; else echo '⚠️ Review needed'; fi) |" >> $GITHUB_STEP_SUMMARY
          echo "| GitLeaks | $GITLEAKS_COUNT | $(if [ "$GITLEAKS_COUNT" -eq 0 ]; then echo '✅ Clean'; else echo '⚠️ Review needed'; fi) |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          
          if [ "$TRUFFLEHOG_COUNT" -gt 0 ] || [ "$GITLEAKS_COUNT" -gt 0 ]; then
            echo "##  Detailed Findings" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            
            if [ "$TRUFFLEHOG_COUNT" -gt 0 ]; then
              echo "### TruffleHog Results" >> $GITHUB_STEP_SUMMARY
              echo "\`\`\`" >> $GITHUB_STEP_SUMMARY
              head -50 security-results/trufflehog-report.txt >> $GITHUB_STEP_SUMMARY 2>/dev/null || echo "Report file not found"
              echo "\`\`\`" >> $GITHUB_STEP_SUMMARY
              echo "" >> $GITHUB_STEP_SUMMARY
            fi
            
            if [ "$GITLEAKS_COUNT" -gt 0 ]; then
              echo "### GitLeaks Results" >> $GITHUB_STEP_SUMMARY
              echo "\`\`\`json" >> $GITHUB_STEP_SUMMARY
              if [ -f "security-results/gitleaks-results.json" ]; then
                # Pretty print JSON if it's valid, otherwise show raw content
                if jq empty security-results/gitleaks-results.json 2>/dev/null; then
                  jq '.' security-results/gitleaks-results.json >> $GITHUB_STEP_SUMMARY 2>/dev/null
                else
                  cat security-results/gitleaks-results.json >> $GITHUB_STEP_SUMMARY
                fi
              else
                echo "Report file not found" >> $GITHUB_STEP_SUMMARY
              fi
              echo "\`\`\`" >> $GITHUB_STEP_SUMMARY
            fi
          fi

      - name: Upload Security Reports
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: security-scan-results-${{ github.run_number }}
          path: security-results/
          retention-days: 30