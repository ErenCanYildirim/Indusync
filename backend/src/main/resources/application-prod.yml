# Production profile configuration
# Optimized for 512MB RAM environments with security and performance best practices

spring:
  # Database connection pool - balanced for concurrency and memory
  datasource:
    hikari:
      maximum-pool-size: 8 # Increased for better concurrency (was 5)
      minimum-idle: 3 # Increased minimum (was 2)
      connection-timeout: 20000 # Slightly reduced timeout
      idle-timeout: 300000 # 5 minutes (reduced from 10)
      max-lifetime: 900000 # 15 minutes (reduced from 30)
      leak-detection-threshold: 60000 # Enable connection leak detection

  # JPA/Hibernate - production optimized
  jpa:
    hibernate:
      ddl-auto: validate # NEVER use 'update' in production
    properties:
      hibernate:
        format_sql: false # Disable SQL formatting in prod
        generate_statistics: false # Disable stats collection
        jdbc:
          batch_size: 20 # Enable batching for better performance
          fetch_size: 50 # Optimize fetch size
    show-sql: false # Never show SQL in production

  # Flyway - production settings
  flyway:
    validate-on-migrate: true # Re-enable validation in prod
    out-of-order: false # Disable out-of-order in prod for safety

  # Cache - use Redis in production for distributed caching
  cache:
    type: redis
    redis:
      time-to-live: 300000 # 5 minutes default TTL
    cache-names:
      - dashboard-statistics
      - order-activity
      - user-sessions
      - rate-limits

  # Redis - production optimized connection pool
  data:
    redis:
      lettuce:
        pool:
          max-active: 4 # Reduced for 512MB RAM
          max-idle: 2 # Reduced pool size
          min-idle: 1
          max-wait: 1s # Faster timeout

  # File upload - production limits
  servlet:
    multipart:
      max-file-size: 5MB # Reduced from 10MB for memory efficiency
      max-request-size: 25MB # Reduced from 50MB

  # Virtual threads - enabled for better concurrency with lower memory overhead
  threads:
    virtual:
      enabled: true
  web:
    cors:
      allowed-origins: ${CORS_ALLOWED_ORIGINS} # Must be explicitly set
      allowed-methods: GET,POST,PUT,PATCH,DELETE
      allowed-headers: Authorization,Content-Type
      allow-credentials: true
      max-age: 3600 # Cache preflight for 1 hour

# Server configuration - optimized for 512MB RAM
server:
  # Tomcat optimization for virtual threads
  tomcat:
    threads:
      max: 200 # Can be higher with virtual threads (low memory overhead)
      min-spare: 10 # Minimum threads
    max-connections: 500 # Increased for better concurrency with virtual threads
    accept-count: 100 # Larger queue for pending requests
    connection-timeout: 20000 # 20 second timeout
  # Enable compression
  compression:
    enabled: true
    mime-types: text/html,text/xml,text/plain,text/css,text/javascript,application/javascript,application/json
    min-response-size: 1024

# Security - production hardening
security:
  jwt:
    enhanced-validation: true
    key-rotation:
      enabled: true # Enable key rotation in production
      interval-days: 15 # Rotate more frequently in prod
    rate-limiting:
      enabled: true
      max-requests-per-minute: 100 # Reduced from 200 for DoS protection
      max-refresh-per-hour: 5 # Reduced from 10

# Actuator - limited exposure for security
management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus # Remove metrics endpoint
      base-path: /actuator
  endpoint:
    health:
      show-details: when-authorized # Hide details from unauthorized users
  security:
    enabled: true
  metrics:
    export:
      prometheus:
        enabled: true
      tags:
        application: ${spring.application.name}
        environment: production
  tracing:
    sampling:
      probability: 0.1 # Sample 10% of traces in production

# Logging - production optimized (less verbose)
logging:
  level:
    root: WARN # Reduce root logging
    org.springframework: WARN # Reduce Spring logging
    com.indusync.indusync_backend: INFO # Keep app logging at INFO
    org.hibernate.SQL: WARN # Disable SQL logging
    org.hibernate.type.descriptor.sql.BasicBinder: WARN # Disable parameter logging
    org.springframework.security: WARN # Reduce security logging
    org.springframework.web: WARN # Reduce web logging
  # Use JSON logging for better parsing in production
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n"
  # Configure log file rotation
  file:
    name: /app/logs/indusync-backend.log
  logback:
    rollingpolicy:
      max-file-size: 50MB
      max-history: 5
      total-size-cap: 200MB

# Swagger - disabled in production
springdoc:
  api-docs:
    enabled: false
  swagger-ui:
    enabled: false

# CORS - restrictive production settings

# Rate limiting - additional production protection
app:
  rate-limiting:
    enabled: true
    global:
      requests-per-minute: 1000 # Global rate limit
    per-user:
      requests-per-minute: 60 # Per user rate limit
    per-ip:
      requests-per-minute: 100 # Per IP rate limit

# Circuit breaker configuration for external services
resilience4j:
  circuitbreaker:
    instances:
      email-service:
        failure-rate-threshold: 50
        wait-duration-in-open-state: 30s
        sliding-window-size: 10
      redis-service:
        failure-rate-threshold: 60
        wait-duration-in-open-state: 10s
        sliding-window-size: 5
# Monitoring and observability