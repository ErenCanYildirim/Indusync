version: "3.8"

services:
  # PostgresSQL database
  postgres:
    image: postgis/postgis:17-3.5-alpine
    container_name: postgress
    restart: unless-stopped
    environment:
      POSTGRES_DB: indusync_db
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: secret
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    networks:
      - indusync-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U admin -d indusync_db"]
      interval: 10s
      timeout: 5s
      retries: 5



  # Spring Boot backend
  backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: indusync-backend
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DATABASE_URL: jdbc:postgresql://postgres:5432/indusync_db
      DATABASE_USERNAME: admin
      DATABASE_PASSWORD: secret
    env_file:
      - .env
    networks:
      - indusync-network
    ports:
      - "8080:8080"

  redis:
    image: redis:7.2-alpine
    container_name: indusync-redis
    restart: unless-stopped
    networks:
      - indusync-network
    ports:
      - "6379:6379"

networks:
  indusync-network:
    driver: bridge

volumes:
  postgres-data: